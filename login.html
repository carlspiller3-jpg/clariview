<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClariView Login | Access Your Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --brand-dark: #21293B;
            --brand-blue: #4697C1;
            --brand-white: #F9FAFA;
            --font-heading: 'Roboto', sans-serif;
            --font-serif: 'Newsreader', serif;
            --bg-body: #0A0F1A;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-heading);
            background-color: var(--bg-body);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--brand-dark);
            width: 100%;
            max-width: 440px;
            padding: 4rem;
            border-radius: 32px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .logo {
            height: 24px;
            margin-bottom: 3rem;
            opacity: 0.9;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: white;
        }

        .serif-text {
            font-family: var(--font-serif);
            font-style: normal;
            font-weight: 400;
            color: var(--brand-blue);
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin-bottom: 3rem;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--brand-blue);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--brand-blue);
            background: rgba(255, 255, 255, 0.06);
        }

        .btn-login {
            width: 100%;
            background: var(--brand-blue);
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(70, 151, 193, 0.2);
        }

        .error-message {
            color: #ff4b4b;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            display: none;
            background: rgba(255, 75, 75, 0.1);
            padding: 0.75rem;
            border-radius: 8px;
        }

        .footer-links {
            margin-top: 2.5rem;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--brand-blue);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <a href="index.html">
            <img src="assets/logo-split-light-text-md.png" alt="ClariView Logo" class="logo">
        </a>
        <h1>Access Your <br><span class="serif-text">Intelligence.</span></h1>
        <p>Enter your credentials to access your executive workspace.</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Corporate Email</label>
                <input type="email" id="email" placeholder="name@organisation.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
            <div id="error" class="error-message">Invalid credentials. Please contact your administrator.</div>
        </form>

        <div class="footer-links">
            <a href="#">Security & Access Support</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error');

            if (email === '1@2.com' && password === 'password') {
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
                // Shake effect
                const card = document.querySelector('.login-card');
                card.style.transform = 'translateX(10px)';
                setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
                setTimeout(() => card.style.transform = 'translateX(0)', 200);
            }
        });
    </script>
</body>

</html>
